{% extends "admin/dashboard.html" %}

{% block admin_title %}Settings{% endblock %}

{% block admin_content %}
<div class="admin-page-header">
    <h3>Site Settings</h3>
</div>

<form method="post" style="max-width: 700px;">
    <div class="admin-card">
        <h4>Company Information</h4>
        <div class="form-group-admin">
            <label>Company Name</label>
            <input type="text" name="company_name" class="form-control-admin" value="{{ settings.company_name|default('') }}">
        </div>
        <div class="form-group-admin">
            <label>Slogan</label>
            <input type="text" name="company_slogan" class="form-control-admin" value="{{ settings.company_slogan|default('') }}">
        </div>
        <div class="form-group-admin">
            <label>Address</label>
            <input type="text" name="company_address" class="form-control-admin" value="{{ settings.company_address|default('') }}">
        </div>
    </div>

    <div class="admin-card">
        <h4>Contact Details</h4>
        <div class="form-group-admin">
            <label>Phone / WhatsApp</label>
            <input type="text" name="company_phone" class="form-control-admin" value="{{ settings.company_phone|default('') }}">
        </div>
        <div class="form-group-admin">
            <label>Email</label>
            <input type="email" name="company_email" class="form-control-admin" value="{{ settings.company_email|default('') }}">
        </div>
        <div class="form-group-admin">
            <label>Indonesia Office</label>
            <input type="text" name="indonesia_office" class="form-control-admin" value="{{ settings.indonesia_office|default('') }}">
        </div>
    </div>

    <div class="admin-card">
        <h4>SEO &amp; Meta</h4>
        <div class="form-group-admin">
            <label>Site Name</label>
            <input type="text" name="site_name" class="form-control-admin" value="{{ settings.site_name|default('') }}">
        </div>
        <div class="form-group-admin">
            <label>Meta Description</label>
            <textarea name="site_description" class="form-control-admin" rows="3">{{ settings.site_description|default('') }}</textarea>
        </div>
    </div>

    <button type="submit" class="btn-admin btn-admin-primary">Save Settings</button>
</form>
{% endblock %}
