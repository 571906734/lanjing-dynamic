{% extends "base.html" %}

{% block title %}Login - {{ super() }}{% endblock %}

{% block content %}
<section class="container" style="max-width: 420px; margin: 80px auto;">
    <h1 style="text-align: center; margin-bottom: 28px; font-size: 1.6rem; color: #1a1a1a;">Sign In</h1>
    
    <form method="post" style="background: #ffffff; padding: 36px 32px; border: 1px solid #e8e8e8; border-radius: 4px;">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position: relative;">
                <input type="password" id="password" name="password" required placeholder="Enter your password" style="width: 100%; padding-right: 38px;">
                <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; line-height: 1; color: #999;" title="Show password">
                    <!-- Open eye -->
                    <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <!-- Closed eye with slash -->
                    <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <path d="m14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember" style="margin: 0;">Remember me</label>
        </div>
        <button type="submit" style="width: 100%; padding: 11px 0; background: #1a3a5c; color: #fff; border: none; border-radius: 4px; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;">Sign In</button>
        
        <p style="text-align: center; margin-top: 18px; font-size: 0.9rem; color: #555;">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: #1a3a5c; font-weight: 600;">Create one</a>
        </p>
    </form>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    
    toggleBtn.addEventListener('click', function() {
        var isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        eyeOpen.style.display = isPassword ? 'none' : 'block';
        eyeClosed.style.display = isPassword ? 'block' : 'none';
        toggleBtn.style.color = isPassword ? '#333' : '#999';
    });
    
    toggleBtn.addEventListener('mouseenter', function() {
        toggleBtn.style.color = '#333';
    });
    toggleBtn.addEventListener('mouseleave', function() {
        toggleBtn.style.color = passwordInput.getAttribute('type') === 'password' ? '#999' : '#333';
    });
});
</script>
{% endblock %}
