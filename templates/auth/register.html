{% extends "base.html" %}

{% block title %}Register - {{ super() }}{% endblock %}

{% block content %}
<section class="container" style="max-width: 420px; margin: 80px auto;">
    <h1 style="text-align: center; margin-bottom: 28px; font-size: 1.6rem; color: #1a1a1a;">Create Account</h1>
    
    <form method="post" style="background: #ffffff; padding: 36px 32px; border: 1px solid #e8e8e8; border-radius: 4px;">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Minimum 8 characters">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter your password">
        </div>
        <button type="submit" style="width: 100%; padding: 11px 0; background: #1a3a5c; color: #fff; border: none; border-radius: 4px; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;">Create Account</button>
        
        <p style="text-align: center; margin-top: 18px; font-size: 0.9rem; color: #555;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #1a3a5c; font-weight: 600;">Sign in</a>
        </p>
    </form>
</section>
{% endblock %}
