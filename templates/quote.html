{% extends "base.html" %}

{% block title %}Request Quote - {{ super() }}{% endblock %}

{% block content %}
<section class="page-banner">
    <div class="container">
        <h1>Request a Quote</h1>
        <p>Tell us about your requirements and we'll get back to you within 24 hours.</p>
    </div>
</section>

<section class="container">
    <form class="quote-form" action="{{ url_for('quote.request_quote') }}" method="post" enctype="multipart/form-data" style="max-width: 800px; margin: 0 auto; padding: 40px 0;">
        <h2 style="margin-bottom: 24px;">Your Details</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Your full name">
            </div>
            <div class="form-group">
                <label for="company">Company *</label>
                <input type="text" id="company" name="company" required placeholder="Company name">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+62 xxx xxxx">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="country">Country *</label>
                <input type="text" id="country" name="country" required placeholder="Indonesia">
            </div>
            <div class="form-group">
                <label for="location">Location / Port</label>
                <input type="text" id="location" name="location" placeholder="Jakarta">
            </div>
        </div>

        <h2 style="margin: 32px 0 24px;">Service Requirements</h2>

        <div class="form-row">
            <div class="form-group">
                <label for="service_type">Service Type *</label>
                <select id="service_type" name="service_type" required>
                    <option value="">-- Select Service --</option>
                    <option>Marine Supply</option>
                    <option>SPS Shore Power</option>
                    <option>Technical Solution</option>
                    <option>Workshop Setup</option>
                    <option>Automation</option>
                    <option>System Integration</option>
                    <option>Consulting</option>
                </select>
            </div>
            <div class="form-group">
                <label for="vessel_type">Vessel Type</label>
                <input type="text" id="vessel_type" name="vessel_type" placeholder="e.g., Bulk Carrier, Tanker, Tugboat">
            </div>
        </div>

        <div class="form-row single">
            <div class="form-group">
                <label for="requirements">Detailed Requirements *</label>
                <textarea id="requirements" name="requirements" rows="6" required placeholder="Please describe your requirements in as much detail as possible..."></textarea>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="timeline">Expected Timeline</label>
                <select id="timeline" name="timeline">
                    <option value="">-- Select --</option>
                    <option>Immediate (within 1 week)</option>
                    <option>Short-term (1-4 weeks)</option>
                    <option>Medium-term (1-3 months)</option>
                    <option>Long-term (3+ months)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="budget">Budget Range</label>
                <select id="budget" name="budget">
                    <option value="">-- Select --</option>
                    <option>Under $10,000</option>
                    <option>$10,000 - $50,000</option>
                    <option>$50,000 - $100,000</option>
                    <option>$100,000 - $500,000</option>
                    <option>$500,000+</option>
                </select>
            </div>
        </div>

        <div class="form-row single">
            <div class="form-group">
                <label for="file">Attach Document (PDF, JPG, PNG, DOC, XLS - max 10MB)</label>
                <input type="file" id="file" name="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" style="padding: 8px;">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Submit Quote Request</button>
    </form>
</section>
{% endblock %}
